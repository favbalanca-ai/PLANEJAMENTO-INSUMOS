<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Planejamento de Safra 26/27</title>
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#16404d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Planejamento">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">
  <aside class="sidebar">
    <div class="brand">
      <span class="brand-logo">🌱</span>
      <div>
        <div class="brand-title">Planejamento</div>
        <div class="brand-sub">Safra 26/27</div>
      </div>
    </div>
    <nav id="nav">
      <a href="#/dashboard" data-view="dashboard" data-mod="planejamento"><span class="ico">📊</span><span class="lbl">Painel</span><span class="lbl-s">Painel</span></a>
      <a href="#/talhoes" data-view="talhoes" data-mod="planejamento"><span class="ico">🗺️</span><span class="lbl">Talhões</span><span class="lbl-s">Talhões</span></a>
      <a href="#/empreendimentos" data-view="empreendimentos" data-mod="planejamento"><span class="ico">🌾</span><span class="lbl">Empreendimentos</span><span class="lbl-s">Culturas</span></a>
      <a href="#/compras" data-view="compras" data-mod="planejamento"><span class="ico">🛒</span><span class="lbl">Demanda de Compras</span><span class="lbl-s">Compras</span></a>
      <a href="#/cotacao" data-view="cotacao" data-mod="planejamento"><span class="ico">🏷️</span><span class="lbl">Cotação</span><span class="lbl-s">Cotação</span></a>
      <a href="#/maquinas" data-view="maquinas" data-mod="planejamento"><span class="ico">🚜</span><span class="lbl">Máquinas</span><span class="lbl-s">Máquinas</span></a>
      <a href="#/dre" data-view="dre" data-mod="planejamento"><span class="ico">💰</span><span class="lbl">DRE Orçada</span><span class="lbl-s">DRE</span></a>
      <a href="#/campo" data-view="campo" data-mod="campo"><span class="ico">🧑‍🌾</span><span class="lbl">Operação de Campo</span><span class="lbl-s">Campo</span></a>
      <a href="#/sync" data-view="sync" data-mod="planejamento campo"><span class="ico">🔄</span><span class="lbl">Sincronizar</span><span class="lbl-s">Sync</span></a>
    </nav>
    <div class="sidebar-foot">
      <button id="btn-export" class="btn btn-ghost btn-sm" title="Exportar dados (JSON)">⬇ Exportar</button>
      <button id="btn-reset" class="btn btn-ghost btn-sm" title="Descartar minhas edições">↺ Restaurar</button>
      <div id="app-ver" class="app-ver" title="Versão do app publicada"></div>
    </div>
  </aside>
  <main class="main">
    <header class="topbar">
      <div class="mod-switch" id="mod-switch">
        <button type="button" data-mod="planejamento"><span class="ms-ico">📋</span><span class="ms-lbl">Planejamento</span></button>
        <button type="button" data-mod="campo"><span class="ms-ico">🧑‍🌾</span><span class="ms-lbl">Campo</span></button>
      </div>
      <h1 id="page-title">Painel</h1>
      <div class="topbar-right">
        <a href="#/sync" id="sync-status" class="sync-status" hidden title="Estado da sincronização"><span class="dot"></span><span class="sync-status-txt">Local</span></a>
        <span id="edit-badge" class="badge badge-muted" hidden>0 edições</span>
        <span class="safra-chip">Safra 2026/2027</span>
      </div>
    </header>
    <section id="content" class="content"><div class="loading">Carregando…</div></section>
  </main>
</div>
<div id="toast" class="toast" hidden></div>
<script>
/* Registra o service worker: mantém o app sempre atualizado (network-first)
   e recarrega sozinho quando uma versão nova assume o controle. */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('sw.js').then(function (reg) {
      var refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', function () {
        if (refreshing) return; refreshing = true; window.location.reload();
      });
      try { reg.update(); } catch (e) {}
      document.addEventListener('visibilitychange', function () {
        if (document.visibilityState === 'visible') { try { reg.update(); } catch (e) {} }
      });
    }).catch(function () {});
  });
}
</script>
<script src="app.js"></script>
</body>
</html>
